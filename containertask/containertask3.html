<!DOCTYPE html> 
<html lang="en"> 
<head> 
    <meta charset="UTF-8"> 
    <title>Task 3 - Semantic Layout Challenge</title> 
    <link rel="stylesheet" href="containertask3.css"> 
</head> 
<body> 
    <div class="page-container"> 
        <header> 
            <div class="logo"></div>
            <h1>Heading 1</h1>
        </header> 
        <nav>
            <ul>
                <li>Home</li>
                <li>About Us</li>
                <li>Contact Us</li>
            </ul>
        </nav> 
        <main class="main-content"> 
            <div class="content-box">
                <h2>Heading 2</h2>
                <p>Paragraph of information text</p>
            </div>
            <div class="image-box">
                <p>image</p>
            </div>
            <!-- TASK: Add the two content boxes (text and image) --> 
        </main> 
        <footer> 
            <ul>
                <li>Footer 1</li>
                <li>Footer 2</li>
                <li>Footer 3</li>
            </ul>
            <div class="social-links">
                <p>Social media links</p>
            </div>
            <!-- TASK: Add footer info and the social links div --> 
        </footer> 
    </div> 
</body> 
</html>
